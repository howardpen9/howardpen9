name: Update README Stars

on:
  schedule:
    # Daily at 06:00 UTC (14:00 UTC+8)
    - cron: "0 6 * * *"
  push:
    branches: [main, master]
    paths:
      - "README.md"
      - ".github/stars.yml"
      - ".github/scripts/update_stars.py"
      - ".github/workflows/update-stars.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Refresh star counts in README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/update_stars.py

      - name: Commit if changed
        run: |
          if git diff --quiet README.md; then
            echo "No star count changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: refresh README star counts"
          git push
